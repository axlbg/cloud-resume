<div class="contact-card card">
  <div class="contact-header">
    <h3><span>Contacto</span>.</h3>
  </div>

  <div class="contact-rows">
    @for (row of data.contacts; track row.href) {
      <a [href]="row.href"
         [target]="row.type !== 'email' ? '_blank' : null"
         [rel]="row.type !== 'email' ? 'noopener' : null"
         class="contact-row">

        <div class="contact-row-icon">
          <!-- GitHub -->
          @if (row.type === 'github') {
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0
                0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20
                4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38
                0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5
                4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44
                7A3.37 3.37 0 0 0 9 18.13V22"/>
            </svg>
          }
          <!-- LinkedIn -->
          @if (row.type === 'linkedin') {
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4
                0v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2z"/>
              <circle cx="4" cy="4" r="2"/>
            </svg>
          }
          <!-- Email -->
          @if (row.type === 'email') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1
                0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          }
        </div>

        <div class="contact-row-info">
          <div class="contact-row-text">{{ row.label }}</div>
          <div class="contact-row-handle">{{ row.handle }}</div>
        </div>

      </a>
    }
  </div>

      <div class="last-updated">
      Última actualización: {{ lastDeploy | date:'d \'de\' MMMM, yyyy' : '' : 'es' }}
    </div>
</div>
