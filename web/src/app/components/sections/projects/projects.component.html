<div class="section-card card fade-in">

  <div class="section-header">
    <h2>Proyectos</h2>
  </div>

  <div class="section-body">

    <div class="filter-bar">
      <button 
        style="width: 8rem;"
        class="filter-btn"
        [class.active]="activeFilter() === 'cloud'"
        (click)="setFilter('cloud')">
        Cloud
      </button>
      <button
        class="filter-btn"
        [class.active]="activeFilter() === 'fullstack'"
        (click)="setFilter('fullstack')">
        Fullstack
      </button>
    </div>

    <div class="projects-grid">
      @for (project of filtered; track project.title) {
<div class="project-item">
  <div class="proj-top">
    <h3>{{ project.title }}</h3>
  </div>
  <p>{{ project.description }}</p>
  <div class="proj-stack">
    @for (tech of project.stack; track tech) {
      <span>{{ tech }}</span>
    }
  </div>

  <div class="proj-links">
    @if (project.githubUrl) {
      <a [href]="project.githubUrl" target="_blank" rel="noopener" class="proj-btn proj-btn--ghost">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35
            6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65
            16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5
            4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
        </svg>
        GitHub
      </a>
    }
    @if (project.liveUrl) {
      <a [href]="project.liveUrl" target="_blank" rel="noopener" class="proj-btn proj-btn--accent">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Ver sitio
      </a>
    }
  </div>
</div>
      }
    </div>

  </div>
</div>
